<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第十三課 華語複習遊戲</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif; background-color: #f0fdfa; }
        .word-btn { transition: all 0.2s ease; }
        .word-btn:hover { transform: translateY(-2px); }
        .passage-box { max-height: 250px; overflow-y: auto; }
        /* Custom Scrollbar for passage */
        .passage-box::-webkit-scrollbar { width: 6px; }
        .passage-box::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 題庫資料 (Quiz Data) ---
        const quizData = [
            // 選擇題 1-8
            {
                type: 'mcq',
                question: '這本小說的_____是誰？這可是當年最受歡迎的題材。',
                options: ['作者', '房客', '攝影', '時代'],
                answer: 0,
                explanation: '「作者」是寫書或創作的人。小說是由「作者」寫的。'
            },
            {
                type: 'mcq',
                question: '為了_____，我們出門應盡量搭乘公共交通工具。',
                options: ['依靠', '環保', '出版', '暫時'],
                answer: 1,
                explanation: '「環保」是環境保護的意思。搭乘公共交通能減少污染，這是為了「環保」。'
            },
            {
                type: 'mcq',
                question: '他的_____作品總是以大自然為題材，給人帶來平靜的感覺。',
                options: ['攝影', '現實', '重大', '時代'],
                answer: 0,
                explanation: '「攝影」指拍照的藝術或技術。以大自然為題材的視覺創作通常是「攝影」作品。'
            },
            {
                type: 'mcq',
                question: '科技的進步給全球人類_____了重大的改變。',
                options: ['出版', '帶來', '鬧', '碰上'],
                answer: 1,
                explanation: '「帶來」表示造成或產生某種結果。「給……帶來改變」是常見且標準的搭配。'
            },
            {
                type: 'mcq',
                question: '那個新來的_____半夜總是很鬧，影響了其他人的休息。',
                options: ['攝影機', '作者', '房客', '公共'],
                answer: 2,
                explanation: '「房客」是指租房子住的人。半夜會鬧、影響別人休息的通常是人，因此選「房客」。'
            },
            {
                type: 'mcq',
                question: '我們不能只活在夢想裡，必須面對_____的社會。',
                options: ['環保', '現實', '以往', '當年'],
                answer: 1,
                explanation: '「現實」與夢想相對，表示真實存在、客觀的情況。面對「現實」的社會是很常見的用法。'
            },
            {
                type: 'mcq',
                question: '剛好_____下大雨，我們暫時在便利商店躲一下吧。',
                options: ['依靠', '碰上', '出版', '應'],
                answer: 1,
                explanation: '「碰上」意思是遇到（通常是偶然的）。偶然遇到下大雨，用「碰上」最合適。'
            },
            {
                type: 'mcq',
                question: '網路時代讓人們可以隨時隨地分享生活中的每一個重要_____。',
                options: ['題材', '作品', '時刻', '帶來'],
                answer: 2,
                explanation: '「時刻」指特定的時間點或短暫的時間。分享生活中的「時刻」非常符合現代人的習慣。'
            },
            // 重組題 1-5
            {
                type: 'unscramble',
                instruction: '請重組以下句子（注意語法：就是……，也……）',
                pieces: ['這部', '攝影作品', '就是', '再貴，', '我', '也', '要買。'],
                answer: ['這部攝影作品就是再貴，我也要買。', '就是這部攝影作品再貴，我也要買。'],
                explanation: '語法「就是……，也……」的主語可以放在「就是」的前面或後面，兩種語序都是正確的。表示即使在極端的條件下，結果也不會改變。'
            },
            {
                type: 'unscramble',
                instruction: '請重組以下句子（注意語法：一方面……，一方面……）',
                pieces: ['我們', '一方面', '要', '發展經濟，', '一方面', '也得', '重視環保。'],
                answer: '我們一方面要發展經濟，一方面也得重視環保。',
                explanation: '語法「一方面……，一方面……」表示同時進行或考慮兩個不同的方面。'
            },
            {
                type: 'unscramble',
                instruction: '請重組以下句子（注意語法：就是……，也……）',
                pieces: ['就是', '碰上', '重大的困難，', '我們', '也', '不能放棄。'],
                answer: ['就是碰上重大的困難，我們也不能放棄。', '我們就是碰上重大的困難，也不能放棄。'],
                explanation: '主語「我們」可以放在「就是」或是「也」前面。使用「就是……，也……」，表示就算遇到極大的困難，也要堅持不放棄。'
            },
            {
                type: 'unscramble',
                instruction: '請重組以下句子（注意語法：一方面……，一方面……）',
                pieces: ['本書作者', '一方面', '在家寫新的作品，', '一方面', '也出現在', '出版活動中。'],
                answer: '本書作者一方面在家寫新的作品，一方面也出現在出版活動中。',
                explanation: '語法「一方面……，一方面……」。描述作者同時寫作與參加活動，兩者並行。'
            },
            {
                type: 'unscramble',
                instruction: '請重組以下句子（注意語法：就是……，也……）',
                pieces: ['就是', '在結婚的', '重要時刻，', '阿明', '也', '沒忘記', '要開玩笑。'],
                answer: ['就是在結婚的重要時刻，阿明也沒忘記要開玩笑。', '阿明就是在結婚的重要時刻，也沒忘記要開玩笑。'],
                explanation: '主語可以放在「就是」前面。表示阿明很喜歡開玩笑，結婚時也沒忘記要做。'
            },
            {
                type: 'unscramble',
                instruction: '請重組以下句子（注意語法：一方面……，一方面……）',
                pieces: ['他', '一方面', '忙著', '出版新書，', '一方面', '還得', '找新房客。'],
                answer: '他一方面忙著出版新書，一方面還得找新房客。',
                explanation: '描述一個人同時在忙兩件事，前面與後面的動作並行。'
            },
            {
                type: 'unscramble',
                instruction: '請重組以下句子',
                pieces: ['以往的', '時代，', '就是', '有', '攝影機，', '也', '不一定', '會用。'],
                answer: '以往的時代，就是有攝影機，也不一定會用。',
                explanation: '結合了生詞與語法。表示在過去的時間裡，即使擁有機器，也不一定懂得操作。'
            },
            // 閱讀測驗 1 (3題)
            {
                type: 'reading',
                passage: '老李是我們家的新房客。他有一個特別的愛好，就是攝影。當年，他花了很多錢買了一台專業的攝影機。他的作品題材多半與「公共環保」有關，他經常到海邊或山上拍照。老李說，他一方面想記錄下美麗的自然風景，一方面也希望透過這些作品，讓全球的人們看到環境被破壞的現實，藉此為社會帶來重大的改變。',
                question: '關於老李，下面哪一個是對的？',
                options: ['他是房東', '他是新來的房客', '他不喜歡攝影', '他的攝影機是別人送的'],
                answer: 1,
                explanation: '文章第一句話明確提到：「老李是我們家的新房客。」'
            },
            {
                type: 'reading',
                passage: '老李是我們家的新房客。他有一個特別的愛好，就是攝影。當年，他花了很多錢買了一台專業的攝影機。他的作品題材多半與「公共環保」有關，他經常到海邊或山上拍照。老李說，他一方面想記錄下美麗的自然風景，一方面也希望透過這些作品，讓全球的人們看到環境被破壞的現實，藉此為社會帶來重大的改變。',
                question: '老李的攝影作品主要關注什麼題材？',
                options: ['城市建築', '歷史故事', '公共環保', '現代科技'],
                answer: 2,
                explanation: '文章中提到：「他的作品題材多半與『公共環保』有關」。'
            },
            {
                type: 'reading',
                passage: '老李是我們家的新房客。他有一個特別的愛好，就是攝影。當年，他花了很多錢買了一台專業的攝影機。他的作品題材多半與「公共環保」有關，他經常到海邊或山上拍照。老李說，他一方面想記錄下美麗的自然風景，一方面也希望透過這些作品，讓全球的人們看到環境被破壞的現實，藉此為社會帶來重大的改變。',
                question: '老李拍照的目的包括什麼？',
                options: ['賺很多錢', '一方面記錄風景，一方面讓大家重視環保現實', '只是為了打發暫時的時間', '為了出版一本關於時代的小說'],
                answer: 1,
                explanation: '文章提到他「一方面想記錄下美麗的自然風景，一方面也希望透過這些作品...看到環境被破壞的現實」。'
            },
            // 閱讀測驗 2 (3題)
            {
                type: 'reading',
                passage: '張教授最近出版了一本新書。這部作品的題材是關於「現代人與手機的關係」。作者在書中提到，以往的時代，人們依靠寫信或公共電話聯絡。但到了現在這個全球化的時代，手機帶來了便利，卻也讓許多人過度依靠它。有人就是暫時離開手機十分鐘，也會覺得很緊張、鬧情緒。張教授認為，我們應當學會放下手機，多看看身邊真實的時刻。',
                question: '張教授新書的題材是什麼？',
                options: ['攝影技術的進步', '現代人過度依靠手機的現象', '全球環保問題', '以往寫信的習慣'],
                answer: 1,
                explanation: '文章提到新書題材是關於「現代人與手機的關係」，並討論了過度依靠手機的現象。'
            },
            {
                type: 'reading',
                passage: '張教授最近出版了一本新書。這部作品的題材是關於「現代人與手機的關係」。作者在書中提到，以往的時代，人們依靠寫信或公共電話聯絡。但到了現在這個全球化的時代，手機帶來了便利，卻也讓許多人過度依靠它。有人就是暫時離開手機十分鐘，也會覺得很緊張、鬧情緒。張教授認為，我們應當學會放下手機，多看看身邊真實的時刻。',
                question: '根據這篇文章，現代人如果暫時沒有手機，可能會有什麼反應？',
                options: ['覺得很輕鬆', '會開始鬧情緒、感到緊張', '會馬上跑去打公共電話', '會去看攝影作品'],
                answer: 1,
                explanation: '文章指出：「有人就是暫時離開手機十分鐘，也會覺得很緊張、鬧情緒。」'
            },
            {
                type: 'reading',
                passage: '張教授最近出版了一本新書。這部作品的題材是關於「現代人與手機的關係」。作者在書中提到，以往的時代，人們依靠寫信或公共電話聯絡。但到了現在這個全球化的時代，手機帶來了便利，卻也讓許多人過度依靠它。有人就是暫時離開手機十分鐘，也會覺得很緊張、鬧情緒。張教授認為，我們應當學會放下手機，多看看身邊真實的時刻。',
                question: '張教授在書中建議大家怎麼做？',
                options: ['買最新款的手機', '多依靠朋友', '放下手機，去體會真實的時刻', '每個人都應該出版一本書'],
                answer: 2,
                explanation: '文章最後一句總結：「張教授認為，我們應當學會放下手機，多看看身邊真實的時刻。」'
            }
        ];

        // --- 評語庫 ---
        const feedbackTexts = {
            perfect: [
                "太棒了！您已經完全掌握了第十三課的內容！",
                "無可挑剔的表現！就算是現在馬上考試也絕對沒問題！",
                "完美！您的華語語感非常好，請繼續保持！"
            ],
            good: [
                "表現得很不錯！一方面複習了生詞，一方面也熟悉了語法。",
                "您的華語程度越來越好了，只有一點小失誤，繼續加油！",
                "做得好！大部分的題材和語法您都已經吸收了。"
            ],
            needsWork: [
                "不要灰心，學習語言就是需要依靠不斷地練習。",
                "碰上困難沒關係，暫時休息一下，把錯誤的題目再看一次吧！",
                "語法和生詞還需要多加熟悉，相信您下次一定會考得更好！"
            ]
        };

        // --- 子元件：重組題 ---
        const Unscramble = ({ data, onAnswerChange, disabled }) => {
            const [available, setAvailable] = useState([]);
            const [selected, setSelected] = useState([]);

            // 初始化或當題目改變時重置
            useEffect(() => {
                const words = data.pieces.map((text, idx) => ({ id: idx, text }));
                // 簡單打亂順序
                setAvailable(words.sort(() => Math.random() - 0.5));
                setSelected([]);
                onAnswerChange('');
            }, [data]);

            const handleSelect = (word) => {
                if(disabled) return;
                setAvailable(available.filter(w => w.id !== word.id));
                const newSelected = [...selected, word];
                setSelected(newSelected);
                onAnswerChange(newSelected.map(w => w.text).join(''));
            };

            const handleDeselect = (word) => {
                if(disabled) return;
                setSelected(selected.filter(w => w.id !== word.id));
                setAvailable([...available, word]);
                onAnswerChange(selected.filter(w => w.id !== word.id).map(w => w.text).join(''));
            };

            return (
                <div className="flex flex-col gap-6">
                    <p className="text-gray-600 text-sm">{data.instruction}</p>
                    
                    {/* 作答區 */}
                    <div className="min-h-[60px] p-4 bg-white border-2 border-teal-200 rounded-lg flex flex-wrap gap-2 items-center shadow-inner">
                        {selected.length === 0 && <span className="text-gray-400 text-sm">請點擊下方詞彙排成正確的句子...</span>}
                        {selected.map(word => (
                            <button 
                                key={`sel-${word.id}`}
                                onClick={() => handleDeselect(word)}
                                disabled={disabled}
                                className={`px-4 py-2 rounded-md font-medium shadow-sm transition-colors ${disabled ? 'bg-teal-100 text-teal-800 cursor-default' : 'bg-teal-500 text-white hover:bg-teal-600 word-btn'}`}
                            >
                                {word.text}
                            </button>
                        ))}
                    </div>

                    {/* 詞彙庫 */}
                    <div className="flex flex-wrap gap-2">
                        {available.map(word => (
                            <button 
                                key={`avail-${word.id}`}
                                onClick={() => handleSelect(word)}
                                disabled={disabled}
                                className={`px-4 py-2 bg-gray-100 text-gray-700 rounded-md font-medium border border-gray-300 shadow-sm ${disabled ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-200 word-btn'}`}
                            >
                                {word.text}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 主元件 ---
        const QuizApp = () => {
            const [gameState, setGameState] = useState('start'); // 'start', 'playing', 'result'
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            
            // 記錄當前題目的選擇/作答狀態
            const [currentAnswer, setCurrentAnswer] = useState(null);
            const [hasChecked, setHasChecked] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);

            // 開發者模式
            const [devModeActive, setDevModeActive] = useState(false);
            const [hasUsedDevMode, setHasUsedDevMode] = useState(false); // 只要開啟過就不計分

            const currentQ = quizData[currentIdx];

            const handleStart = () => {
                setGameState('playing');
                setCurrentIdx(0);
                setScore(0);
                setHasUsedDevMode(false);
                resetQuestionState();
            };

            const resetQuestionState = () => {
                setCurrentAnswer(null);
                setHasChecked(false);
                setIsCorrect(false);
            };

            const handleCheckAnswer = () => {
                if (currentAnswer === null || currentAnswer === '') return;
                
                let correct = false;
                if (currentQ.type === 'mcq' || currentQ.type === 'reading') {
                    correct = (currentAnswer === currentQ.answer);
                } else if (currentQ.type === 'unscramble') {
                    if (Array.isArray(currentQ.answer)) {
                        correct = currentQ.answer.includes(currentAnswer);
                    } else {
                        correct = (currentAnswer === currentQ.answer);
                    }
                }

                setIsCorrect(correct);
                setHasChecked(true);

                // 只有在非開發者模式，且第一次檢查時才加分 (這裡簡化為只要該題正確就加分，不允許重試加分)
                if (correct && !hasUsedDevMode) {
                    setScore(s => s + 1);
                }
            };

            const handleNext = () => {
                if (currentIdx < quizData.length - 1) {
                    setCurrentIdx(currentIdx + 1);
                    resetQuestionState();
                } else {
                    setGameState('result');
                }
            };

            const toggleDevMode = () => {
                setDevModeActive(!devModeActive);
                if (!devModeActive) setHasUsedDevMode(true);
            };

            const jumpToQuestion = (e) => {
                const idx = parseInt(e.target.value);
                setCurrentIdx(idx);
                resetQuestionState();
            };

            const getRandomFeedback = () => {
                const ratio = score / quizData.length;
                let arr = [];
                if (ratio === 1) arr = feedbackTexts.perfect;
                else if (ratio >= 0.7) arr = feedbackTexts.good;
                else arr = feedbackTexts.needsWork;
                return arr[Math.floor(Math.random() * arr.length)];
            };

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4 relative">
                    
                    {/* 開發者模式面板 */}
                    {gameState === 'playing' && (
                        <div className="fixed bottom-4 right-4 z-50 flex flex-col items-end gap-2">
                            {devModeActive && (
                                <div className="bg-slate-800 text-white p-4 rounded-lg shadow-lg flex flex-col gap-2 w-64">
                                    <h3 className="font-bold border-b border-slate-600 pb-1">開發者模式</h3>
                                    <label className="text-sm">跳至題目：</label>
                                    <select 
                                        className="text-black p-1 rounded"
                                        value={currentIdx}
                                        onChange={jumpToQuestion}
                                    >
                                        {quizData.map((q, i) => (
                                            <option key={i} value={i}>
                                                第 {i + 1} 題 ({q.type === 'mcq' ? '選擇' : q.type === 'unscramble' ? '重組' : '閱讀'})
                                            </option>
                                        ))}
                                    </select>
                                    <p className="text-xs text-yellow-300 mt-2">提示：啟用開發者模式後，結算不計分。</p>
                                </div>
                            )}
                            <button 
                                onClick={toggleDevMode}
                                className="bg-slate-200 text-slate-600 hover:bg-slate-300 px-3 py-2 rounded-full shadow font-mono text-xs font-bold transition-colors"
                            >
                                {devModeActive ? '關閉 Dev Mode' : '開啟 Dev Mode'}
                            </button>
                        </div>
                    )}

                    {/* Header */}
                    <div className="w-full max-w-3xl mb-8 text-center">
                        <h1 className="text-3xl font-bold text-teal-800 mb-2">L13 短文綜合複習遊戲</h1>
                        <p className="text-teal-600">華語學習・精準練習</p>
                    </div>

                    {/* Start Screen */}
                    {gameState === 'start' && (
                        <div className="w-full max-w-2xl bg-white rounded-2xl shadow-xl p-8 text-center border-t-4 border-teal-500">
                            <h2 className="text-2xl font-bold text-gray-800 mb-6">歡迎來到挑戰！</h2>
                            <p className="text-gray-600 mb-6 leading-relaxed">
                                這是一份為您準備的華語複習遊戲。內容包含：<br/>
                                <span className="inline-block mt-2 font-medium text-teal-700">8題選擇題、7題句子重組、2篇閱讀測驗</span><br/>
                                所有題目皆環繞第十三課的生詞與重點語法。<br/>
                                準備好面對現實的挑戰了嗎？就是碰上困難，我們也不能放棄！
                            </p>
                            <button 
                                onClick={handleStart}
                                className="bg-teal-600 text-white text-lg font-bold py-3 px-8 rounded-full hover:bg-teal-700 transition shadow-lg hover:shadow-xl"
                            >
                                開始測驗
                            </button>
                        </div>
                    )}

                    {/* Playing Screen */}
                    {gameState === 'playing' && currentQ && (
                        <div className="w-full max-w-3xl flex flex-col gap-4">
                            
                            {/* Progress */}
                            <div className="bg-white rounded-full h-3 w-full shadow-inner overflow-hidden">
                                <div 
                                    className="bg-teal-500 h-full transition-all duration-300"
                                    style={{ width: `${((currentIdx) / quizData.length) * 100}%` }}
                                ></div>
                            </div>
                            <div className="flex justify-between text-sm text-gray-500 font-medium px-2">
                                <span>第 {currentIdx + 1} / {quizData.length} 題</span>
                                {devModeActive && <span className="text-orange-500">Dev Mode 啟用中</span>}
                            </div>

                            {/* Question Card */}
                            <div className="bg-white rounded-2xl shadow-lg p-6 md:p-8 border border-gray-100 flex flex-col gap-6">
                                
                                {/* 標籤 */}
                                <div className="inline-block px-3 py-1 bg-teal-100 text-teal-800 text-xs font-bold rounded-full w-max">
                                    {currentQ.type === 'mcq' ? '選擇題' : currentQ.type === 'unscramble' ? '重組題' : '閱讀測驗'}
                                </div>

                                {/* 閱讀測驗文章 */}
                                {currentQ.type === 'reading' && (
                                    <div className="bg-amber-50 rounded-lg p-5 passage-box border border-amber-200">
                                        <h3 className="font-bold text-amber-800 mb-2">閱讀文章：</h3>
                                        <p className="text-gray-700 leading-relaxed tracking-wide">{currentQ.passage}</p>
                                    </div>
                                )}

                                {/* 題目本文 */}
                                <h2 className="text-xl font-bold text-gray-800 leading-snug">
                                    {currentQ.question}
                                </h2>

                                {/* 選擇題 / 閱讀題 的選項 */}
                                {(currentQ.type === 'mcq' || currentQ.type === 'reading') && (
                                    <div className="flex flex-col gap-3 mt-2">
                                        {currentQ.options.map((opt, i) => (
                                            <button
                                                key={i}
                                                onClick={() => { if(!hasChecked) setCurrentAnswer(i) }}
                                                disabled={hasChecked}
                                                className={`text-left p-4 rounded-xl border-2 transition-all font-medium
                                                    ${currentAnswer === i && !hasChecked ? 'border-teal-500 bg-teal-50 text-teal-900' : ''}
                                                    ${!hasChecked && currentAnswer !== i ? 'border-gray-200 hover:border-teal-300 hover:bg-gray-50' : ''}
                                                    ${hasChecked && i === currentQ.answer ? 'border-green-500 bg-green-50 text-green-900' : ''}
                                                    ${hasChecked && currentAnswer === i && currentAnswer !== currentQ.answer ? 'border-red-500 bg-red-50 text-red-900' : ''}
                                                    ${hasChecked && currentAnswer !== i && i !== currentQ.answer ? 'border-gray-200 opacity-50' : ''}
                                                `}
                                            >
                                                {String.fromCharCode(65 + i)}. {opt}
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {/* 重組題 */}
                                {currentQ.type === 'unscramble' && (
                                    <Unscramble 
                                        data={currentQ} 
                                        onAnswerChange={setCurrentAnswer} 
                                        disabled={hasChecked}
                                    />
                                )}

                                {/* 回饋區塊 (送出後顯示) */}
                                {hasChecked && (
                                    <div className={`p-5 rounded-xl border ${isCorrect ? 'bg-green-100 border-green-300' : 'bg-red-100 border-red-300'} animate-[fadeIn_0.3s_ease-in-out]`}>
                                        <h3 className={`font-bold text-lg mb-1 ${isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                            {isCorrect ? '答對了！' : '答錯了喔！'}
                                        </h3>
                                        {!isCorrect && (
                                            <p className="text-red-700 font-medium mb-2">
                                                正確答案是：<span className="font-bold">
                                                    {currentQ.type === 'unscramble' 
                                                        ? (Array.isArray(currentQ.answer) ? currentQ.answer.join(' 或 ') : currentQ.answer) 
                                                        : currentQ.options[currentQ.answer]}
                                                </span>
                                            </p>
                                        )}
                                        <div className="mt-3 text-gray-700 bg-white/60 p-3 rounded-lg text-sm border border-white/40">
                                            <span className="font-bold mr-1">教師解析：</span>
                                            {currentQ.explanation}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* 控制按鈕 */}
                            <div className="flex justify-end mt-4">
                                {!hasChecked ? (
                                    <button 
                                        onClick={handleCheckAnswer}
                                        disabled={currentAnswer === null || currentAnswer === ''}
                                        className={`px-8 py-3 rounded-xl font-bold text-lg shadow transition
                                            ${(currentAnswer !== null && currentAnswer !== '') ? 'bg-teal-600 text-white hover:bg-teal-700 hover:shadow-lg' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}
                                        `}
                                    >
                                        確認答案
                                    </button>
                                ) : (
                                    <button 
                                        onClick={handleNext}
                                        className="bg-amber-500 text-white px-8 py-3 rounded-xl font-bold text-lg shadow hover:bg-amber-600 hover:shadow-lg transition"
                                    >
                                        {currentIdx === quizData.length - 1 ? '查看成績' : '下一題'}
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Result Screen */}
                    {gameState === 'result' && (
                        <div className="w-full max-w-2xl bg-white rounded-2xl shadow-xl p-10 text-center border-t-4 border-amber-500 animate-[fadeIn_0.5s_ease-in-out]">
                            <h2 className="text-3xl font-bold text-gray-800 mb-8">測驗結束！</h2>
                            
                            {hasUsedDevMode ? (
                                <div className="bg-slate-100 p-6 rounded-xl mb-8 border border-slate-300">
                                    <p className="text-xl font-bold text-slate-600">開發者測試模式</p>
                                    <p className="text-slate-500 mt-2">本次作答不顯示計算分數。</p>
                                </div>
                            ) : (
                                <div className="bg-teal-50 p-8 rounded-2xl mb-8 border border-teal-100">
                                    <p className="text-gray-600 mb-2 font-medium">您的總成績</p>
                                    <div className="text-6xl font-black text-teal-600 mb-4">
                                        {score} <span className="text-2xl text-teal-400">/ {quizData.length}</span>
                                    </div>
                                    <p className="text-lg text-teal-800 font-bold bg-white inline-block px-4 py-2 rounded-full shadow-sm">
                                        {getRandomFeedback()}
                                    </p>
                                </div>
                            )}

                            <button 
                                onClick={handleStart}
                                className="bg-teal-600 text-white text-lg font-bold py-3 px-8 rounded-full hover:bg-teal-700 transition shadow-lg hover:shadow-xl"
                            >
                                再挑戰一次
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizApp />);
    </script>
</body>
</html>
